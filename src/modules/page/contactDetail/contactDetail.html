<template>
    <div class="slds-p-horizontal_large">
    <template lwc:if={hasContact}>

        <ui-page-header
            variant="record-home"
            icon-name="standard:contact"
            object-label="Contact"
            title={contactName}
            meta-text={contactMeta}>

            <div slot="actions" class="slds-grid slds-grid_vertical-align-center slds-gutters_xx-small">
                <div class="slds-col">
                    <lightning-button
                        label={followLabel}
                        variant={followVariant}
                        icon-name={followIconName}
                        onclick={handleFollow}>
                    </lightning-button>
                </div>
                <div class="slds-col">
                    <lightning-button-group>
                        <lightning-button label="Edit" variant="neutral"></lightning-button>
                        <lightning-button label="Delete" variant="neutral"></lightning-button>
                        <lightning-button label="Clone" variant="neutral"></lightning-button>
                        <lightning-button-menu
                            alternative-text="More Actions"
                            variant="border-filled"
                            menu-alignment="right">
                            <lightning-menu-item label="Send Email" value="send_email"></lightning-menu-item>
                            <lightning-menu-item label="Log a Call" value="log_call"></lightning-menu-item>
                            <lightning-menu-item label="Create Task" value="create_task"></lightning-menu-item>
                        </lightning-button-menu>
                    </lightning-button-group>
                </div>
            </div>

            <li slot="details" class="slds-page-header__detail-block">
                <p class="slds-text-title slds-truncate" title="Company">Company</p>
                <p class="slds-truncate" title={contact.company}>{contact.company}</p>
            </li>
            <li slot="details" class="slds-page-header__detail-block">
                <p class="slds-text-title slds-truncate" title="Title">Title</p>
                <p class="slds-truncate" title={contact.title}>{contact.title}</p>
            </li>
            <li slot="details" class="slds-page-header__detail-block">
                <p class="slds-text-title slds-truncate" title="Email">Email</p>
                <lightning-formatted-email value={contact.email}></lightning-formatted-email>
            </li>
            <li slot="details" class="slds-page-header__detail-block">
                <p class="slds-text-title slds-truncate" title="Phone">Phone</p>
                <lightning-formatted-phone value={contact.phone}></lightning-formatted-phone>
            </li>

        </ui-page-header>

        <!-- Body: 2/3 Details + 1/3 Activity -->
        <div class="slds-grid slds-gutters slds-m-top_medium">
            <!-- Left 2/3: Details Card -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_8-of-12">
                <lightning-card title="Contact Details">
                    <div class="slds-var-p-around_medium">
                        <div class="slds-form slds-form_stacked">
                            <div class="slds-grid slds-wrap slds-gutters_small">
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <div class="slds-form-element slds-form-element_stacked">
                                        <span class="slds-form-element__label slds-text-title">Full Name</span>
                                        <div class="slds-form-element__control">
                                            <span class="slds-form-element__static slds-truncate">{contact.name}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <div class="slds-form-element slds-form-element_stacked">
                                        <span class="slds-form-element__label slds-text-title">Account Name</span>
                                        <div class="slds-form-element__control">
                                            <span class="slds-form-element__static slds-truncate">{contact.company}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <div class="slds-form-element slds-form-element_stacked">
                                        <span class="slds-form-element__label slds-text-title">Title</span>
                                        <div class="slds-form-element__control">
                                            <span class="slds-form-element__static slds-truncate">{contact.title}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <div class="slds-form-element slds-form-element_stacked">
                                        <span class="slds-form-element__label slds-text-title">Department</span>
                                        <div class="slds-form-element__control">
                                            <span class="slds-form-element__static slds-truncate">{contact.department}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <div class="slds-form-element slds-form-element_stacked">
                                        <span class="slds-form-element__label slds-text-title">Email</span>
                                        <div class="slds-form-element__control">
                                            <lightning-formatted-email value={contact.email}></lightning-formatted-email>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <div class="slds-form-element slds-form-element_stacked">
                                        <span class="slds-form-element__label slds-text-title">Phone</span>
                                        <div class="slds-form-element__control">
                                            <lightning-formatted-phone value={contact.phone}></lightning-formatted-phone>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <div class="slds-form-element slds-form-element_stacked">
                                        <span class="slds-form-element__label slds-text-title">Mobile</span>
                                        <div class="slds-form-element__control">
                                            <lightning-formatted-phone value={contact.mobile}></lightning-formatted-phone>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <div class="slds-form-element slds-form-element_stacked">
                                        <span class="slds-form-element__label slds-text-title">Mailing Address</span>
                                        <div class="slds-form-element__control">
                                            <span class="slds-form-element__static">{mailingAddress}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-1">
                                    <div class="slds-form-element slds-form-element_stacked">
                                        <span class="slds-form-element__label slds-text-title">Description</span>
                                        <div class="slds-form-element__control">
                                            <span class="slds-form-element__static">{contact.description}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </lightning-card>
            </div>

            <!-- Right 1/3: Activity Feed -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                <lightning-card title="Activity">
                    <lightning-button-group slot="actions">
                        <lightning-button label="Log a Call" variant="neutral"></lightning-button>
                        <lightning-button label="New Task" variant="neutral"></lightning-button>
                    </lightning-button-group>
                    <div class="slds-var-p-around_medium">
                        <ul class="slds-timeline">
                            <template for:each={activityItems} for:item="item">
                                <li key={item.id} class="slds-timeline__item">
                                    <div class="slds-media slds-m-bottom_small">
                                        <div class="slds-media__figure">
                                            <template lwc:if={item.type}>
                                                <lightning-icon
                                                    icon-name={item.iconName}
                                                    size="small"
                                                    alternative-text={item.type}>
                                                </lightning-icon>
                                            </template>
                                        </div>
                                        <div class="slds-media__body">
                                            <div class="slds-grid slds-grid_align-spread">
                                                <p class="slds-truncate"><strong>{item.subject}</strong></p>
                                                <p class="slds-text-body_small slds-text-color_weak slds-no-flex">{item.date}</p>
                                            </div>
                                            <p class="slds-text-body_small slds-m-top_xx-small">{item.description}</p>
                                        </div>
                                    </div>
                                </li>
                            </template>
                        </ul>
                    </div>
                </lightning-card>
            </div>
        </div>

    </template>

    <template lwc:else>
        <div class="slds-illustration slds-illustration_small slds-p-around_large slds-text-align_center">
            <p class="slds-text-heading_medium">Contact not found</p>
            <p class="slds-m-top_small">
                <lightning-button label="Back to Contacts" variant="brand" onclick={handleBackToList}></lightning-button>
            </p>
        </div>
    </template>
    </div>
</template>
