<template>
    <div class="slds-container_x-large slds-container_center slds-p-horizontal_large">

        <ui-page-header
            variant="object-home"
            icon-name="standard:contact"
            object-label="Contacts"
            title="All Contacts">

            <lightning-breadcrumbs slot="breadcrumbs">
                <lightning-breadcrumb label="Home" href="/"></lightning-breadcrumb>
            </lightning-breadcrumbs>

            <div slot="actions" class="slds-grid slds-grid_vertical-align-center slds-gutters_xx-small">
                <div class="slds-col">
                    <lightning-button-group>
                        <lightning-button label="New" variant="neutral"></lightning-button>
                        <lightning-button label="Import" variant="neutral"></lightning-button>
                        <lightning-button label="Add to Campaign" variant="neutral"></lightning-button>
                        <lightning-button label="Send Email" variant="neutral"></lightning-button>
                    </lightning-button-group>
                </div>
                <div class="slds-col">
                    <lightning-button-menu
                        alternative-text="More Actions"
                        variant="border-filled"
                        menu-alignment="right">
                        <lightning-menu-item label="Printable View" value="printable"></lightning-menu-item>
                    </lightning-button-menu>
                </div>
            </div>
        </ui-page-header>

        <!-- Meta row: item count + list controls -->
        <div class="slds-grid slds-grid_vertical-align-center slds-var-p-vertical_x-small">
            <p class="slds-col slds-text-body_small slds-text-color_weak">{metaText}</p>
            <div class="slds-col_bump-left slds-grid slds-grid_vertical-align-center slds-gutters_xx-small">
                <div class="slds-col">
                    <lightning-input
                        type="search"
                        label="Search contacts"
                        variant="label-hidden"
                        placeholder="Search this list..."
                        onchange={handleSearch}>
                    </lightning-input>
                </div>
                <div class="slds-col">
                    <lightning-button-icon icon-name="utility:settings" variant="border-filled" alternative-text="List View Controls" title="List View Controls"></lightning-button-icon>
                </div>
                <div class="slds-col">
                    <lightning-button-icon icon-name="utility:table" variant="border-filled" alternative-text="Change view" title="Change view"></lightning-button-icon>
                </div>
                <div class="slds-col">
                    <lightning-button-icon icon-name="utility:edit" variant="border-filled" alternative-text="Edit List" title="Edit List"></lightning-button-icon>
                </div>
                <div class="slds-col">
                    <lightning-button-icon icon-name="utility:refresh" variant="border-filled" alternative-text="Refresh List" title="Refresh List"></lightning-button-icon>
                </div>
                <div class="slds-col">
                    <lightning-button-group>
                        <lightning-button-icon icon-name="utility:chart" variant="border-filled" alternative-text="Charts" title="Charts"></lightning-button-icon>
                        <lightning-button-icon icon-name="utility:filterList" variant="border-filled" alternative-text="Filters" title="Filters"></lightning-button-icon>
                    </lightning-button-group>
                </div>
            </div>
        </div>

        <lightning-datatable
            key-field="id"
            data={filteredData}
            columns={columns}
            sorted-by={sortedBy}
            sorted-direction={sortedDirection}
            onsort={handleSort}
            onrowaction={handleRowAction}
            show-row-number-column>
        </lightning-datatable>

    </div>
</template>
